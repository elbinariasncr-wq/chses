<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>ChessLens — Game Analyzer | Fix Version</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a25;
    --surface3: #22222f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --accent: #7c6af7;
    --accent2: #a89ef9;
    --accent-dim: rgba(124,106,247,0.15);
    --green: #3dd68c;
    --red: #f96060;
    --yellow: #f0c040;
    --blue: #60b8f9;
    --text: #e8e6ff;
    --muted: #7a7899;
    --muted2: #4a4868;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed; top:0; left:0; right:0; bottom:0;
    background-image: linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index:0;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 0 16px; position:relative; z-index:1; }
  header {
    padding: 24px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .header-inner { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-icon {
    width:36px; height:36px; border-radius:10px;
    background: var(--accent); display:flex; align-items:center; justify-content:center;
    font-size:18px;
  }
  .logo-text { font-size:18px; font-weight:800; letter-spacing:-0.5px; }
  .logo-text span { color: var(--accent2); }
  .tagline { font-size:10px; color:var(--muted); font-family:'Space Mono',monospace; margin-top:2px; }
  .search-area {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .search-label { font-size:12px; color:var(--muted); font-family:'Space Mono',monospace; margin-bottom:8px; letter-spacing:1px; text-transform:uppercase; }
  .search-row { display:flex; gap:10px; flex-wrap:wrap; }
  .search-input {
    flex:1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 500;
    outline: none;
    transition: border-color 0.2s;
    min-width: 160px;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted2); font-weight:400; }
  .search-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s, transform 0.1s;
  }
  .search-btn:hover { opacity:0.9; }
  .search-btn:active { transform: scale(0.97); }
  .search-btn:disabled { opacity:0.5; cursor:not-allowed; }
  .games-grid { display:flex; flex-direction:column; gap:10px; margin-bottom:28px; }
  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  }
  .game-card:hover { border-color: var(--border2); background: var(--surface2); }
  .game-card.active { border-color: var(--accent); background: var(--accent-dim); }
  .game-result-badge {
    width:48px; height:48px; border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; font-family:'Space Mono',monospace;
    flex-shrink:0;
  }
  .badge-win { background:rgba(61,214,140,0.15); color:var(--green); border:1px solid rgba(61,214,140,0.3); }
  .badge-loss { background:rgba(249,96,96,0.15); color:var(--red); border:1px solid rgba(249,96,96,0.3); }
  .badge-draw { background:rgba(240,192,64,0.15); color:var(--yellow); border:1px solid rgba(240,192,64,0.3); }
  .game-info { flex:1; min-width:0; }
  .game-players { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .game-players .vs { color:var(--muted2); font-weight:400; margin:0 5px; }
  .game-meta { font-size:11px; color:var(--muted); font-family:'Space Mono',monospace; margin-top:4px; }
  .game-elos { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
  .elo-row { display:flex; align-items:center; gap:5px; font-size:11px; font-family:'Space Mono',monospace; }
  .analyze-btn-sm {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--accent2);
    padding: 7px 12px;
    font-family: 'Syne',sans-serif;
    font-size:11px; font-weight:700;
    cursor:pointer;
    transition: all 0.2s;
  }
  .analyze-btn-sm:hover { background:var(--accent-dim); border-color:var(--accent); }
  .analysis-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom:28px;
  }
  .analysis-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
  }
  .analysis-body { display:flex; flex-direction:column; }
  @media (min-width: 768px) { .analysis-body { flex-direction:row; } }
  .board-col { padding:16px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; }
  .board-wrap { position:relative; width:100%; max-width:360px; aspect-ratio:1/1; border-radius:8px; overflow:hidden; border:2px solid var(--border2); }
  #chessboard { display:grid; grid-template-columns:repeat(8,1fr); width:100%; height:100%; }
  .sq { display:flex; align-items:center; justify-content:center; font-size:clamp(20px, 8vw, 34px); cursor:pointer; user-select:none; }
  .sq.light { background:#c8b9e8; }
  .sq.dark  { background:#6750a4; }
  .sq.last-move-from { background: rgba(240,192,64,0.4) !important; }
  .sq.last-move-to   { background: rgba(240,192,64,0.55) !important; }
  .coord-file { display:flex; width:100%; max-width:360px; margin-top:4px; }
  .coord-file span { flex:1; text-align:center; font-size:9px; color:var(--muted2); font-family:'Space Mono',monospace; }
  .board-controls { display:flex; align-items:center; gap:8px; margin-top:12px; flex-wrap:wrap; justify-content:center; }
  .ctrl-btn { background:var(--surface2); border:1px solid var(--border2); border-radius:7px; color:var(--text); padding:6px 12px; font-family:'Space Mono',monospace; font-size:12px; cursor:pointer; }
  .move-counter { font-size:12px; font-family:'Space Mono',monospace; color:var(--muted); flex:1; text-align:center; }
  .right-col { flex:1; padding:0 16px 20px 16px; min-width:0; }
  .elo-section { background: var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:14px; }
  .elo-players { display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .elo-player { text-align:center; flex:1; }
  .elo-player-name { font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .elo-player-rating { font-size:18px; font-weight:800; font-family:'Space Mono',monospace; }
  .tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
  .tab-btn { background:transparent; border:1px solid var(--border); border-radius:7px; color:var(--muted); padding:5px 12px; font-family:'Syne',sans-serif; font-size:12px; font-weight:600; cursor:pointer; }
  .tab-btn.active { background:var(--accent-dim); border-color:var(--accent); color:var(--accent2); }
  .eval-section { margin-bottom:16px; }
  .eval-bar-outer { height:10px; background:var(--surface3); border-radius:5px; overflow:hidden; }
  .eval-bar-inner { height:100%; background:linear-gradient(90deg, var(--accent), var(--accent2)); transition:width 0.3s; border-radius:5px; }
  .best-move-box { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:12px; margin-bottom:14px; }
  .bm-move { font-size:18px; font-weight:700; font-family:'Space Mono',monospace; color:var(--green); word-break:break-all; }
  .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
  .stat-card { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:10px; }
  .stat-value { font-size:16px; font-weight:700; }
  .stat-value.green { color:var(--green); }
  .stat-value.red { color:var(--red); }
  .stat-value.yellow { color:var(--yellow); }
  .moves-scroll { max-height:200px; overflow-y:auto; background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:6px; }
  .move-row { display:flex; align-items:center; gap:4px; padding:2px 0; }
  .move-num { font-size:10px; color:var(--muted2); width:22px; }
  .move-san { font-size:11px; font-family:'Space Mono',monospace; cursor:pointer; padding:2px 6px; border-radius:4px; }
  .move-san.active { background:var(--accent-dim); color:var(--accent2); }
  .move-san.blunder { color:var(--red); }
  .move-san.mistake { color:#f9963c; }
  .move-san.inaccuracy { color:var(--yellow); }
  .move-san.best { color:var(--green); }
  .error-box { background:rgba(249,96,96,0.1); border:1px solid rgba(249,96,96,0.3); border-radius:10px; padding:12px 16px; color:var(--red); font-size:12px; margin-bottom:20px; display:none; }
  .engine-status { display:flex; align-items:center; gap:6px; font-size:10px; color:var(--muted); }
  .engine-dot { width:6px; height:6px; border-radius:50%; background:var(--red); }
  .engine-dot.ready { background:var(--green); box-shadow:0 0 5px var(--green); }
  .spinner { width:24px; height:24px; border:2px solid var(--border2); border-top-color:var(--accent); border-radius:50%; animation: spin 0.7s linear infinite; display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .section-title { font-size:12px; color:var(--muted); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-inner">
      <div class="logo"><div class="logo-icon">♟</div><div><div class="logo-text">Chess<span>Lens</span></div><div class="tagline">// AI-powered analysis</div></div></div>
      <div class="engine-status"><div class="engine-dot" id="engineDot"></div><span id="engineStatus">Ready (simplified)</span></div>
    </div>
  </header>
  <div class="search-area">
    <div class="search-label">Chess.com Username</div>
    <div class="search-row">
      <input type="text" class="search-input" id="usernameInput" placeholder="e.g. magnuscarlsen, hikaru" autocomplete="off" />
      <button class="search-btn" id="fetchBtn">Fetch Games →</button>
    </div>
  </div>
  <div class="error-box" id="errorBox"></div>
  <div id="gamesSection" style="display:none;"><div class="section-title">Last 5 Completed Games</div><div class="games-grid" id="gamesList"></div></div>
  <div class="analysis-panel" id="analysisPanel" style="display:none;">
    <div class="analysis-header"><div><div class="analysis-game-title" id="analysisTitleEl">—</div><div class="analysis-game-sub" id="analysisSubEl">—</div></div><div><span id="engineProgressText" style="font-size:10px;"></span></div></div>
    <div class="analysis-body">
      <div class="board-col">
        <div style="display:flex; flex-direction:column; align-items:center;"><div class="board-wrap"><div id="chessboard"></div></div><div class="coord-file" id="coordFile"></div></div>
        <div class="board-controls"><button class="ctrl-btn" onclick="gotoMove(0)">«</button><button class="ctrl-btn" onclick="gotoMove(currentMoveIdx-1)">‹</button><div class="move-counter" id="moveCounter">0 / 0</div><button class="ctrl-btn" onclick="gotoMove(currentMoveIdx+1)">›</button><button class="ctrl-btn" onclick="gotoMove(positions.length-1)">»</button></div>
      </div>
      <div class="right-col">
        <div class="elo-section" id="eloSection" style="display:none;"><div class="elo-players"><div class="elo-player"><div class="elo-player-name" id="whiteNameEl">—</div><div class="elo-player-rating" id="whiteEloEl">—</div><div style="font-size:9px;">⬜ White</div></div><div class="elo-vs">vs</div><div class="elo-player"><div class="elo-player-name" id="blackNameEl">—</div><div class="elo-player-rating" id="blackEloEl">—</div><div style="font-size:9px;">⬛ Black</div></div></div></div>
        <div class="tabs"><button class="tab-btn active" onclick="switchTab('eval')">Evaluation</button><button class="tab-btn" onclick="switchTab('moves')">Moves</button><button class="tab-btn" onclick="switchTab('stats')">Stats</button></div>
        <div id="tabEval"><div class="eval-section"><div class="eval-bar-outer"><div class="eval-bar-inner" id="evalBar" style="width:50%"></div></div></div><div class="best-move-box"><div class="bm-label">Suggested Move</div><div class="bm-move" id="bestMoveEl">—</div></div></div>
        <div id="tabMoves" style="display:none;"><div class="moves-title">Move List</div><div class="moves-scroll" id="movesList"></div></div>
        <div id="tabStats" style="display:none;"><div class="stats-grid"><div class="stat-card"><div class="stat-label">Best Moves</div><div class="stat-value green" id="stBest">—</div></div><div class="stat-card"><div class="stat-label">Inaccuracies</div><div class="stat-value yellow" id="stInaccuracy">—</div></div><div class="stat-card"><div class="stat-label">Mistakes</div><div class="stat-value" style="color:#f9963c" id="stMistake">—</div></div><div class="stat-card"><div class="stat-label">Blunders</div><div class="stat-value red" id="stBlunder">—</div></div></div></div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script>
// ======================== FIX VERSION - NO EXTERNAL ENGINE, USE SIMPLE EVAL ========================
const PIECES = { wK:'♔', wQ:'♕', wR:'♖', wB:'♗', wN:'♘', wP:'♙', bK:'♚', bQ:'♛', bR:'♜', bB:'♝', bN:'♞', bP:'♟' };
let games = [], currentGame = null, positions = [], moveEvals = [];
let currentMoveIdx = 0, evalHistory = [], moveQualities = [];
let evalChart = null;  // not used, but safe

// Simple material-based evaluation (no Stockfish needed)
function simpleEval(fen) {
  const pieceValues = { p:1, n:3, b:3, r:5, q:9, k:0 };
  let whiteScore = 0, blackScore = 0;
  const fenParts = fen.split(' ');
  const boardPart = fenParts[0];
  let rank = 0, file = 0;
  for (let ch of boardPart) {
    if (ch === '/') { rank++; file=0; continue; }
    if (ch >= '1' && ch <= '8') { file += parseInt(ch); continue; }
    const isWhite = ch === ch.toUpperCase();
    const piece = ch.toLowerCase();
    const value = pieceValues[piece] || 0;
    if (isWhite) whiteScore += value;
    else blackScore += value;
    file++;
  }
  let score = (whiteScore - blackScore) / 10;
  // apply side to move: positive means advantage for side to move
  const turn = fenParts[1] === 'w' ? 1 : -1;
  return score * turn;
}

async function fetchGames() {
  let username = document.getElementById('usernameInput').value.trim().toLowerCase();
  if (!username) { showError('Please enter a username'); return; }
  if (!/^[a-z0-9_-]+$/i.test(username)) { showError('Username can only contain letters, numbers, underscore, and hyphen'); return; }
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true; btn.textContent = 'Fetching...';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('gamesSection').style.display = 'none';
  document.getElementById('analysisPanel').style.display = 'none';
  try {
    // Use CORS proxy to avoid Chess.com API blocking
    const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
    const archivesRes = await fetch(proxyUrl + `https://api.chess.com/pub/player/${username}/games/archives`);
    if (!archivesRes.ok) throw new Error(`User "${username}" not found or CORS blocked. Try using a CORS proxy or different network.`);
    const archivesData = await archivesRes.json();
    const archives = archivesData.archives;
    if (!archives || archives.length === 0) throw new Error('No game archives found');
    let collected = [];
    for (let i = archives.length - 1; i >= 0 && collected.length < 5; i--) {
      const gRes = await fetch(proxyUrl + archives[i]);
      if (!gRes.ok) continue;
      const gData = await gRes.json();
      const finished = (gData.games || []).filter(g => g.pgn && g.rules === 'chess' && g.white && g.black);
      collected = [...finished.reverse(), ...collected];
    }
    collected = collected.slice(-5).reverse();
    if (collected.length === 0) throw new Error('No completed games found');
    games = collected.slice(0,5);
    renderGamesList(username);
  } catch(err) {
    showError(err.message + ' — Try using VPN or different network, or the Chess.com API may be temporarily blocked.');
  } finally {
    btn.disabled = false; btn.textContent = 'Fetch Games →';
  }
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
}

function renderGamesList(username) {
  const container = document.getElementById('gamesList');
  container.innerHTML = '';
  games.forEach((g, idx) => {
    const isWhite = g.white.username.toLowerCase() === username;
    const me = isWhite ? g.white : g.black;
    const opp = isWhite ? g.black : g.white;
    const myResult = me.result;
    const outcome = myResult === 'win' ? 'WIN' : (myResult === 'draw'||myResult==='agreed'||myResult==='repetition'||myResult==='stalemate'||myResult==='insufficient'||myResult==='50move'||myResult==='timevsinsufficient') ? 'DRAW' : 'LOSS';
    const badgeClass = outcome==='WIN'?'badge-win':outcome==='LOSS'?'badge-loss':'badge-draw';
    const whiteElo = g.white.rating || '?';
    const blackElo = g.black.rating || '?';
    const date = g.end_time ? new Date(g.end_time*1000).toLocaleDateString() : '—';
    const tc = g.time_class || '—';
    const card = document.createElement('div');
    card.className = 'game-card';
    card.innerHTML = `
      <div class="game-result-badge ${badgeClass}">${outcome}</div>
      <div class="game-info"><div class="game-players"><span style="color:${outcome==='WIN'?'var(--green)':outcome==='LOSS'?'var(--red)':'var(--yellow)'}">${escapeHtml(me.username)} (${me.rating||'?'})</span><span class="vs">vs</span><span style="color:var(--muted)">${escapeHtml(opp.username)} (${opp.rating||'?'})</span></div><div class="game-meta">${tc} · ${date} · ${isWhite?'⬜ White':'⬛ Black'}</div></div>
      <div class="game-elos"><div class="elo-row"><span class="elo-label">⬜</span><span class="elo-val">${whiteElo}</span></div><div class="elo-row"><span class="elo-label">⬛</span><span class="elo-val">${blackElo}</span></div></div>
      <button class="analyze-btn-sm" onclick="startAnalysis(${idx}, event)">Analyze ▶</button>
    `;
    card.onclick = (e) => { if (!e.target.classList.contains('analyze-btn-sm')) selectGame(idx, card); };
    container.appendChild(card);
  });
  document.getElementById('gamesSection').style.display = 'block';
}

function selectGame(idx, card) {
  document.querySelectorAll('.game-card').forEach(c=>c.classList.remove('active'));
  card.classList.add('active');
}

async function startAnalysis(idx, ev) {
  if (ev) ev.stopPropagation();
  currentGame = games[idx];
  document.querySelectorAll('.game-card').forEach(c=>c.classList.remove('active'));
  document.querySelectorAll('.game-card')[idx].classList.add('active');
  const chess = new Chess();
  if (!chess.load_pgn(currentGame.pgn)) { showError('Failed to parse PGN'); return; }
  const hist = chess.history({verbose:true});
  positions = ['rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1'];
  const c2 = new Chess();
  for (const move of hist) { c2.move(move); positions.push(c2.fen()); }
  currentMoveIdx = 0;
  evalHistory = []; moveQualities = []; moveEvals = [];
  updateAnalysisHeader(currentGame);
  setupEloSection(currentGame);
  renderBoard(positions[0]);
  updateMovesList(hist, []);
  document.getElementById('analysisPanel').style.display = 'block';
  document.getElementById('analysisPanel').scrollIntoView({behavior:'smooth', block:'start'});
  await runSimpleAnalysis(hist);
}

function updateAnalysisHeader(g) {
  document.getElementById('analysisTitleEl').textContent = `${g.white.username} vs ${g.black.username}`;
  const date = g.end_time ? new Date(g.end_time*1000).toLocaleDateString() : '';
  document.getElementById('analysisSubEl').textContent = `${g.time_class||'—'} · ${date} · ${g.white.result==='win'?g.white.username+' won':g.black.result==='win'?g.black.username+' won':'Draw'}`;
}

function setupEloSection(g) {
  document.getElementById('whiteNameEl').textContent = g.white.username;
  document.getElementById('blackNameEl').textContent = g.black.username;
  document.getElementById('whiteEloEl').textContent = g.white.rating || '?';
  document.getElementById('blackEloEl').textContent = g.black.rating || '?';
  document.getElementById('eloSection').style.display = 'block';
}

async function runSimpleAnalysis(hist) {
  document.getElementById('engineProgressText').textContent = 'Analyzing...';
  let prevEval = 0;
  for (let i = 0; i < positions.length; i++) {
    const ev = simpleEval(positions[i]);
    evalHistory.push(ev);
    moveEvals.push({eval: ev, bestMove: null});
    if (i > 0) {
      const delta = Math.abs(ev - prevEval);
      let quality;
      if (delta < 0.2) quality = 'best';
      else if (delta < 0.5) quality = 'good';
      else if (delta < 1.0) quality = 'inaccuracy';
      else if (delta < 2.0) quality = 'mistake';
      else quality = 'blunder';
      moveQualities.push(quality);
    }
    prevEval = ev;
    if (i === currentMoveIdx) updateEvalUI(i);
    updateMovesList(hist, moveQualities);
    await new Promise(r=>setTimeout(r,5));
  }
  document.getElementById('engineProgressText').textContent = '✓ Complete';
  updateStats(hist, moveQualities);
}

function renderBoard(fen) {
  const board = document.getElementById('chessboard');
  board.innerHTML = '';
  const c = new Chess(fen);
  const b = c.board();
  for (let rank = 0; rank < 8; rank++) {
    for (let file = 0; file < 8; file++) {
      const sq = document.createElement('div');
      const isLight = (rank+file)%2===0;
      sq.className = 'sq ' + (isLight?'light':'dark');
      const piece = b[rank][file];
      if (piece) sq.textContent = PIECES[piece.color + piece.type.toUpperCase()] || '';
      sq.dataset.rank = rank; sq.dataset.file = file;
      board.appendChild(sq);
    }
  }
  const cf = document.getElementById('coordFile');
  cf.innerHTML = '';
  'abcdefgh'.split('').forEach(f=>{ const s=document.createElement('span');s.textContent=f;cf.appendChild(s); });
}

function renderBoardWithHighlights(fen, fromSq, toSq) {
  renderBoard(fen);
  if (!fromSq || !toSq) return;
  const sqs = document.querySelectorAll('.sq');
  sqs.forEach(sq => {
    const r = parseInt(sq.dataset.rank);
    const f = parseInt(sq.dataset.file);
    const sqName = 'abcdefgh'[f] + (8-r);
    if (fromSq === sqName) sq.classList.add('last-move-from');
    if (toSq === sqName) sq.classList.add('last-move-to');
  });
}

function gotoMove(idx) {
  if (!positions.length) return;
  idx = Math.max(0, Math.min(positions.length-1, idx));
  currentMoveIdx = idx;
  const chess = new Chess(); chess.load_pgn(currentGame.pgn);
  const hist = chess.history({verbose:true});
  const from = idx>0 ? hist[idx-1].from : null;
  const to = idx>0 ? hist[idx-1].to : null;
  renderBoardWithHighlights(positions[idx], from, to);
  document.getElementById('moveCounter').textContent = `${idx} / ${positions.length-1}`;
  updateEvalUI(idx);
  highlightMoveInList(idx);
}

function updateEvalUI(idx) {
  if (!moveEvals[idx]) return;
  const ev = moveEvals[idx].eval;
  if (ev === null) return;
  const isWhiteTurn = idx%2===0;
  const score = isWhiteTurn ? ev : -ev;
  const pct = Math.max(5, Math.min(95, 50 + score*5));
  document.getElementById('evalBar').style.width = pct+'%';
  if (idx>0 && moveQualities[idx-1]) {
    const q = moveQualities[idx-1];
    const labels = {best:'✓ Best', good:'● Good', inaccuracy:'? Inaccuracy', mistake:'?! Mistake', blunder:'?? Blunder'};
    document.getElementById('bestMoveEl').innerHTML = labels[q] || '—';
  } else {
    document.getElementById('bestMoveEl').innerHTML = '—';
  }
}

function updateMovesList(hist, qualities) {
  const el = document.getElementById('movesList');
  let html = '';
  for (let i=0; i<hist.length; i+=2) {
    const moveNum = Math.floor(i/2)+1;
    const wMove = hist[i];
    const bMove = hist[i+1];
    const wQ = qualities[i]||'';
    const bQ = qualities[i+1]||'';
    const wSym = wQ==='blunder'?'??':wQ==='mistake'?'?!':wQ==='inaccuracy'?'?':'';
    const bSym = bQ==='blunder'?'??':bQ==='mistake'?'?!':bQ==='inaccuracy'?'?':'';
    html += `<div class="move-row"><span class="move-num">${moveNum}.</span><span class="move-san ${wQ}" data-idx="${i+1}" onclick="gotoMove(${i+1})">${wMove.san}${wSym}</span>${bMove?`<span class="move-san ${bQ}" data-idx="${i+2}" onclick="gotoMove(${i+2})">${bMove.san}${bSym}</span>`:''}</div>`;
  }
  el.innerHTML = html;
  highlightMoveInList(currentMoveIdx);
}

function highlightMoveInList(idx) {
  document.querySelectorAll('.move-san').forEach(el=>el.classList.remove('active'));
  const active = document.querySelector(`.move-san[data-idx="${idx}"]`);
  if (active) { active.classList.add('active'); active.scrollIntoView({block:'nearest'}); }
}

function updateStats(hist, qualities) {
  const count = (arr,type)=>arr.filter(q=>q===type).length;
  document.getElementById('stBest').textContent = count(qualities,'best');
  document.getElementById('stInaccuracy').textContent = count(qualities,'inaccuracy');
  document.getElementById('stMistake').textContent = count(qualities,'mistake');
  document.getElementById('stBlunder').textContent = count(qualities,'blunder');
}

function switchTab(tab) {
  document.getElementById('tabEval').style.display = tab==='eval'?'block':'none';
  document.getElementById('tabMoves').style.display = tab==='moves'?'block':'none';
  document.getElementById('tabStats').style.display = tab==='stats'?'block':'none';
  document.querySelectorAll('.tab-btn').forEach((btn,i)=>{
    btn.classList.toggle('active', ['eval','moves','stats'][i]===tab);
  });
}
function escapeHtml(str) { return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
document.addEventListener('keydown', e => { if(positions.length && e.key==='ArrowRight') gotoMove(currentMoveIdx+1); if(e.key==='ArrowLeft') gotoMove(currentMoveIdx-1); });
document.getElementById('usernameInput').addEventListener('keydown', e=>{ if(e.key==='Enter') fetchGames(); });
renderBoard('rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1');
document.getElementById('analysisPanel').style.display='none';
</script>
